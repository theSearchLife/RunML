name: Release

# Cut a release when Cargo.toml changes on main (bump the `version` field to publish),
# or on demand via the "Run workflow" button (Actions tab -> Release -> Run workflow,
# pick a branch). Each release contains the self-contained per-platform executable
# (ONNX Runtime is statically linked); the model.onnx is distributed separately.
#
# Builds Linux, Windows and macOS arm64. Intel macOS (x86_64) is NOT built: ort ships no
# x86_64-apple-darwin ONNX Runtime prebuilt, and Apple has discontinued Intel Macs.
on:
  push:
    branches: [main]
    paths:
      - "Cargo.toml"
      - ".github/workflows/release.yml"
      - ".github/actions/**"
  # Manual trigger from the GitHub Actions UI (no inputs needed).
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  get-version:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.v.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
      - id: v
        shell: bash
        run: |
          version=$(grep -m1 '^version' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

  build:
    needs: get-version
    # A macOS signing/notarization hiccup shouldn't block the Linux/Windows release.
    continue-on-error: ${{ contains(matrix.name, 'macos') }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            name: linux-x86_64
            bin: ml-runner
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: windows-x86_64
            bin: ml-runner.exe
          - os: macos-14
            target: aarch64-apple-darwin
            name: macos-arm64
            bin: ml-runner
    runs-on: ${{ matrix.os }}
    env:
      # Confidence threshold baked into the binary. Set repo variable
      # MANTA_CONFIDENCE_THRESHOLD to override; defaults to 0.6.
      MANTA_CONFIDENCE_THRESHOLD: ${{ vars.MANTA_CONFIDENCE_THRESHOLD || '0.6' }}
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Sign & notarize (macOS)
        if: runner.os == 'macOS'
        uses: ./.github/actions/sign-notarize-macos
        with:
          binary: target/${{ matrix.target }}/release/${{ matrix.bin }}
          certificate: ${{ secrets.MACOS_CERTIFICATE }}
          certificate-password: ${{ secrets.MACOS_CERTIFICATE_PWD }}
          signing-identity: ${{ secrets.MACOS_SIGNING_IDENTITY }}
          keychain-password: ${{ secrets.KEYCHAIN_PASSWORD }}
          api-key: ${{ secrets.APPLE_API_KEY }}
          api-key-id: ${{ secrets.APPLE_API_KEY_ID }}
          api-issuer-id: ${{ secrets.APPLE_API_ISSUER_ID }}

      - name: Package (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          asset="ml-runner-${{ needs.get-version.outputs.tag }}-${{ matrix.name }}"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$asset"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          asset="ml-runner-${{ needs.get-version.outputs.tag }}-${{ matrix.name }}.exe"
          cp "target/${{ matrix.target }}/release/${{ matrix.bin }}" "$asset"
          echo "ASSET=$asset" >> "$GITHUB_ENV"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ env.ASSET }}

  release:
    needs: [get-version, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.get-version.outputs.tag }}
          name: ${{ needs.get-version.outputs.tag }}
          generate_release_notes: true
          files: artifacts/**/*
